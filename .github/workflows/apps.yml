name: Build & Push Apps

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
  workflow_dispatch:
    inputs:
      app:
        description: "App name to build (leave empty to build all changed apps)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ── Detect which apps have changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app/service matrix
        id: build-matrix
        env:
          MANUAL_APP: ${{ inputs.app }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import subprocess
          from pathlib import Path

          apps_dir = Path("apps")
          manual_app = os.environ.get("MANUAL_APP", "").strip()

          def find_services(app_dir: Path) -> list[dict]:
              app_yml = app_dir / "app.yml"
              if not app_yml.exists():
                  return []

              entries = []
              services_dir = app_dir / "services"
              if services_dir.is_dir():
                  for svc_dir in sorted(services_dir.iterdir()):
                      if (svc_dir / "Dockerfile").exists():
                          entries.append({
                              "app": app_dir.name,
                              "service": svc_dir.name,
                              "context": str(svc_dir),
                              "image": f"{app_dir.name}-{svc_dir.name}",
                          })
              elif (app_dir / "Dockerfile").exists():
                  entries.append({
                      "app": app_dir.name,
                      "service": "",
                      "context": str(app_dir),
                      "image": app_dir.name,
                  })
              return entries

          if manual_app:
              app_dirs = [apps_dir / manual_app]
          else:
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD^", "HEAD"],
                  capture_output=True, text=True,
              )
              changed_files = result.stdout.splitlines()
              changed_apps = set()
              for f in changed_files:
                  parts = Path(f).parts
                  if len(parts) >= 2 and parts[0] == "apps" and not parts[1].startswith("."):
                      changed_apps.add(parts[1])
              app_dirs = [apps_dir / a for a in sorted(changed_apps) if (apps_dir / a).is_dir()]

          matrix = []
          for app_dir in app_dirs:
              matrix.extend(find_services(app_dir))

          print(json.dumps({"include": matrix}))
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"matrix={json.dumps({'include': matrix})}\n")
          EOF

  # ── Build & push each image in parallel ────────────────────────────────────
  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=pr,prefix=pr-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ── Validate all app configs ────────────────────────────────────────────────
  validate-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate app configs
        run: python scripts/homelab-apps validate --strict

traefik_services:
  # ── Simple HTTP services (template-based) ─────────────────────────────────

  - service_name: actual-budget
    template: simple-http
    service_host: "budget.{{ traefik_local_domain }}"
    service_backend_url: "http://{{ hostvars['tools'].ansible_host }}:5006"

  - service_name: ha
    template: simple-http
    service_host: "ha.{{ traefik_local_domain }}"
    service_backend_url: "http://192.168.1.75:8123"

  - service_name: n8n
    template: simple-http
    service_host: "n8n.{{ traefik_local_domain }}"
    service_backend_url: "http://192.168.1.106:5678"

  - service_name: test
    template: simple-http
    service_host: "test.{{ traefik_local_domain }}"
    service_backend_url: "http://100.75.65.121:8083"

  - service_name: grafana
    template: simple-http
    service_host: "grafana.{{ traefik_local_domain }}"
    service_backend_url: "http://127.0.0.1:3000"

  - service_name: prometheus
    template: simple-http
    service_host: "prometheus.{{ traefik_local_domain }}"
    service_backend_url: "http://127.0.0.1:9090"

  - service_name: alertmanager
    template: simple-http
    service_host: "alertmanager.{{ traefik_local_domain }}"
    service_backend_url: "http://127.0.0.1:9093"

  # ── TCP services (template-based) ─────────────────────────────────────────

  - service_name: minecraft-router
    template: tcp-service
    service_entrypoint: minecraft
    service_backend_address: "{{ hostvars['minecraft'].ansible_host }}:25565"

  # ── Complex inline services ───────────────────────────────────────────────

  - filename: arr-stack.yml
    content: |
      http:
        routers:
          prowlarr:
            entryPoints:
              - https
            rule: "Host(`prowlarr.{{ traefik_local_domain }}`)"
            service: prowlarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          sonarr:
            entryPoints:
              - https
            rule: "Host(`sonarr.{{ traefik_local_domain }}`)"
            service: sonarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          radarr:
            entryPoints:
              - https
            rule: "Host(`radarr.{{ traefik_local_domain }}`)"
            service: radarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          readarr:
            entryPoints:
              - https
            rule: "Host(`readarr.{{ traefik_local_domain }}`)"
            service: readarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          bazarr:
            entryPoints:
              - https
            rule: "Host(`bazarr.{{ traefik_local_domain }}`)"
            service: bazarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          homarr:
            entryPoints:
              - https
            rule: "Host(`homarr.{{ traefik_local_domain }}`)"
            service: homarr-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          jellyfin:
            entryPoints:
              - https
            rule: "Host(`jellyfin.{{ traefik_local_domain }}`)"
            service: jellyfin-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
          qbittorrent:
            entryPoints:
              - https
            rule: "Host(`qbittorrent.{{ traefik_local_domain }}`)"
            service: qbittorrent-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"

        services:
          prowlarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:9696"
          sonarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:8989"
          radarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:7878"
          readarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:8787"
          bazarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:6767"
          homarr-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:7575"
          jellyfin-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:8096"
          qbittorrent-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['media'].ansible_host }}:8080"

  - filename: authelia.yml
    content: |
      http:
        routers:
          authelia:
            rule: "Host(`auth.{{ traefik_local_domain }}`)"
            entryPoints:
              - https
            service: authelia-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
        middlewares:
          authelia:
            forwardAuth:
              address: "http://{{ hostvars['authelia'].ansible_host }}:9091/api/authz/forward-auth"
              trustForwardHeader: true
              authResponseHeaders:
                - "Remote-User"
                - "Remote-Groups"
                - "Remote-Email"
                - "Remote-Name"
        services:
          authelia-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['authelia'].ansible_host }}:9091"

  - filename: portainer.yml
    content: |
      http:
        routers:
          portainer:
            rule: "Host(`portainer.{{ traefik_local_domain }}`)"
            entryPoints:
              - https
            service: portainer-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
        services:
          portainer-service:
            loadBalancer:
              serversTransport: portainer-transport
              servers:
                - url: "https://{{ hostvars['tools'].ansible_host }}:9443"
        serversTransports:
          portainer-transport:
            insecureSkipVerify: true

  - filename: proxmox.yml
    content: |
      http:
        routers:
          proxmox:
            entryPoints:
              - https
            rule: "Host(`proxmox.{{ traefik_local_domain }}`)"
            service: proxmox-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
        services:
          proxmox-service:
            loadBalancer:
              servers:
                - url: "https://{{ hostvars['pve'].ansible_host }}:8006"
              serversTransport: proxmox-tls
        serversTransports:
          proxmox-tls:
            insecureSkipVerify: true

  - filename: traefik_api.yml
    content: |
      http:
        routers:
          dashboard:
            entryPoints:
              - https
            rule: Host(`traefik.{{ traefik_local_domain }}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
            service: api@internal
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
              domains:
                - main: "{{ traefik_local_domain }}"
                  sans:
                    - "*.{{ traefik_local_domain }}"
            middlewares:
              - auth
        middlewares:
          auth:
            basicAuth:
              users:
                - "{{ traefik_dashboard_credentials }}"

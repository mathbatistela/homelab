        firecrawl: {}
        hermes: {}
        infra: {}
        media: {}
        minecraft-be: {}
        minecraft: {}
        n8n: {}
        pve: {}
        tailscale: {}
        tools: {}

    unmanaged:
      vars:
        ansible_connection: ssh
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/homelab
      hosts:
        ha:
          ansible_user: hassio
        openwebui: {}

    monitored_nodes:
      hosts:
        pve: {}
        media: {}
        database: {}
        minecraft: {}
        tools: {}
        tailscale: {}
        openwebui: {}
        n8n: {}
        hermes: {}
        firecrawl: {}

    docker_monitored:
      hosts:
        media: {}
        tools: {}
        hermes: {}

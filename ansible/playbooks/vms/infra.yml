- name: "Install Traefik"
  hosts: infra
  gather_facts: true
  become: true
  roles:
    - traefik

- name: "Configure Traefik services"
  hosts: infra
  become: true
  gather_facts: true
  pre_tasks:
    - name: Initialize generated Traefik services list
      ansible.builtin.set_fact:
        generated_traefik_services: []

    - name: Find service manifest files
      ansible.builtin.find:
        paths: "{{ repo_root }}/config/services"
        patterns: "*.yml"
        recurse: true
      delegate_to: localhost
      become: false
      register: traefik_manifest_files

    - name: Load service manifests for Traefik generation
      ansible.builtin.include_vars:
        file: "{{ item.path }}"
        name: loaded_service_manifest
      loop: "{{ traefik_manifest_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: traefik_manifest_loads

    - name: Build generated simple Traefik services from manifests
      ansible.builtin.set_fact:
        generated_traefik_services: "{{ generated_traefik_services + [generated_service] }}"
      loop: "{{ traefik_manifest_loads.results }}"
      vars:
        manifest: "{{ item.ansible_facts.loaded_service_manifest.service_manifest }}"
        generated_service:
          service_name: "{{ manifest.name }}"
          template: "{{ manifest.exposure.local.template | default('simple-http') }}"
          service_host: "{{ manifest.exposure.local.subdomain }}.{{ traefik_local_domain }}"
          service_backend_url: "{{ manifest.service.protocol }}://{{ hostvars[manifest.host].ansible_host }}:{{ manifest.service.port }}"
      when:
        - manifest.exposure.local.enabled | default(false)
        - manifest.exposure.local.mode | default('generated') == 'generated'

    - name: Initialize fragment Traefik services list
      ansible.builtin.set_fact:
        fragment_traefik_services: []

    - name: Load Traefik fragment files
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: loaded_traefik_fragment
      loop: "{{ lookup('ansible.builtin.fileglob', repo_root + '/config/fragments/traefik/*.yml', wantlist=True) }}"
      register: traefik_fragment_loads

    - name: Collect Traefik fragment services
      ansible.builtin.set_fact:
        fragment_traefik_services: "{{ fragment_traefik_services + item.ansible_facts.loaded_traefik_fragment.traefik_fragment_services }}"
      loop: "{{ traefik_fragment_loads.results }}"
  tasks:
    - name: "Configure {{ item.service_name | default(item.filename) }}"
      ansible.builtin.include_role:
        name: traefik
        tasks_from: configure_service
      vars:
        traefik_conf: "{{ item }}"
      loop: "{{ (generated_traefik_services | default([])) + (fragment_traefik_services | default([])) }}"
      loop_control:
        label: "{{ item.service_name | default(item.filename) }}"
  tags:
    - traefik_config

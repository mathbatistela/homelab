---
- name: Configure UFW firewall
  hosts: racknerd_vm0
  become: true
  gather_facts: true
  tags:
    - ufw
  tasks:
    - name: Ensure UFW is installed
      ansible.builtin.package:
        name: ufw
        state: present

    - name: Allow required ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "22", proto: tcp }
        - { port: "80", proto: tcp }
        - { port: "443", proto: tcp }
        - { port: "25565", proto: tcp }
        - { port: "51820", proto: udp }

    - name: Remove stale CheckMK port
      community.general.ufw:
        rule: allow
        port: "6556"
        proto: tcp
        delete: true
      ignore_errors: true

    - name: Ensure UFW is enabled
      community.general.ufw:
        state: enabled
        policy: deny

- name: Deploy Pangolin stack
  hosts: racknerd_vm0
  become: true
  gather_facts: true
  pre_tasks:
    - name: Initialize generated Pangolin resources
      ansible.builtin.set_fact:
        generated_pangolin_resources: {}
      tags: always

    - name: Find service manifest files
      ansible.builtin.find:
        paths: "{{ repo_root }}/config/services"
        patterns: "*.yml"
        recurse: true
      delegate_to: localhost
      become: false
      register: pangolin_manifest_files
      tags: always

    - name: Load service manifests for Pangolin generation
      ansible.builtin.include_vars:
        file: "{{ item.path }}"
        name: loaded_service_manifest
      loop: "{{ pangolin_manifest_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: pangolin_manifest_loads
      tags: always

    - name: Build generated Pangolin resources from manifests
      ansible.builtin.set_fact:
        generated_pangolin_resources: "{{ generated_pangolin_resources | combine({ generated_key: generated_resource }, recursive=True) }}"
      loop: "{{ pangolin_manifest_loads.results }}"
      vars:
        manifest: "{{ item.ansible_facts.loaded_service_manifest.service_manifest }}"
        generated_key: "generated_{{ manifest.name | replace('-', '_') }}"
        generated_resource:
          name: "{{ manifest.display_name | default(manifest.name) }}"
          protocol: "{{ manifest.exposure.public.protocol | default(manifest.service.protocol) }}"
          full-domain: "{{ manifest.exposure.public.subdomain }}.{{ pangolin_base_domain }}"
          auth: "{{ {'sso-enabled': true} if (manifest.exposure.public.auth.sso | default(false)) else omit }}"
          targets:
            - site: "{{ pangolin_site_nice_id }}"
              hostname: "{{ hostvars[manifest.host].ansible_host }}"
              port: "{{ manifest.service.port }}"
              method: "{{ manifest.exposure.public.protocol | default(manifest.service.protocol) }}"
      when:
        - manifest.exposure.public.enabled | default(false)
        - manifest.exposure.public.mode | default('generated') == 'generated'
      tags: always

    - name: Initialize fragment Pangolin resources
      ansible.builtin.set_fact:
        fragment_pangolin_resources: {}
      tags: always

    - name: Load Pangolin fragment files
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: loaded_pangolin_fragment
      loop: "{{ lookup('ansible.builtin.fileglob', repo_root + '/config/fragments/pangolin/*.yml', wantlist=True) }}"
      register: pangolin_fragment_loads
      tags: always

    - name: Collect Pangolin fragment resources
      ansible.builtin.set_fact:
        fragment_pangolin_resources: "{{ fragment_pangolin_resources | combine(item.ansible_facts.loaded_pangolin_fragment.pangolin_fragment_resources, recursive=True) }}"
      loop: "{{ pangolin_fragment_loads.results }}"
      tags: always

    - name: Merge all Pangolin resources into blueprint
      ansible.builtin.set_fact:
        pangolin_blueprint:
          public-resources: "{{ generated_pangolin_resources | combine(fragment_pangolin_resources, recursive=True) }}"
      tags: always
  roles:
    - geerlingguy.docker
    - pangolin

- name: Deploy Newt agent on infra
  hosts: infra
  become: true
  gather_facts: true
  tags:
    - newt_agent

  pre_tasks:
    - name: Fetch Pangolin container info on racknerd_vm0
      community.docker.docker_container_info:
        name: pangolin
      delegate_to: racknerd_vm0
      register: pangolin_remote

    - name: Assert Pangolin container is present and running
      ansible.builtin.assert:
        that:
          - pangolin_remote.exists
          - pangolin_remote.container.State.Running
        fail_msg: "Pangolin container is not running on racknerd_vm0"

  tasks:
    - name: Deploy Newt agent container
      community.docker.docker_container:
        name: newt_agent
        image: fosrl/newt
        command: >-
          --id "{{ pangolin_newt_id }}"
          --secret "{{ pangolin_newt_secret }}"
          --endpoint "{{ pangolin_newt_endpoint }}"
        detach: true
        tty: true
        restart_policy: unless-stopped

---
- name: Configure UFW firewall
  hosts: racknerd_vm0
  become: true
  gather_facts: true
  tasks:
    - name: Ensure UFW is installed
      ansible.builtin.package:
        name: ufw
        state: present

    - name: Allow required ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "22", proto: tcp }
        - { port: "80", proto: tcp }
        - { port: "443", proto: tcp }
        - { port: "25565", proto: tcp }
        - { port: "51820", proto: udp }

    - name: Remove stale CheckMK port
      community.general.ufw:
        rule: allow
        port: "6556"
        proto: tcp
        delete: true
      ignore_errors: true

    - name: Ensure UFW is enabled
      community.general.ufw:
        state: enabled
        policy: deny

- name: Deploy Pangolin stack
  hosts: racknerd_vm0
  become: true
  gather_facts: true
  roles:
    - geerlingguy.docker
    - pangolin

- name: Deploy Newt agent on infra
  hosts: infra
  become: true
  gather_facts: true
  tags:
    - newt_agent

  pre_tasks:
    - name: Fetch Pangolin container info on racknerd_vm0
      community.docker.docker_container_info:
        name: pangolin
      delegate_to: racknerd_vm0
      register: pangolin_remote

    - name: Assert Pangolin container is present and running
      ansible.builtin.assert:
        that:
          - pangolin_remote.exists
          - pangolin_remote.container.State.Running
        fail_msg: "Pangolin container is not running on racknerd_vm0"

  tasks:
    - name: Deploy Newt agent container
      community.docker.docker_container:
        name: newt_agent
        image: fosrl/newt
        command: >-
          --id "{{ pangolin_newt_id }}"
          --secret "{{ pangolin_newt_secret }}"
          --endpoint "{{ pangolin_newt_endpoint }}"
        detach: true
        tty: true
        restart_policy: unless-stopped

---
- name: Ensure build dependencies for camofox are present
  ansible.builtin.apt:
    name:
      - git
      - make
      - curl
      - ca-certificates
    state: present
    update_cache: true

- name: Clone camofox-browser source (skip updates to preserve local patches)
  ansible.builtin.git:
    repo: "{{ camofox_repo }}"
    dest: "{{ camofox_dir }}"
    version: master
    update: false
    # Patches are applied below; update=false prevents conflicts and avoids
    # rebuilding the image on every playbook run.

# Upstream bug: server.js calls localVirtualDisplay.get() without awaiting it, so
# a Promise is passed to Camoufox as DISPLAY ("[object Promise]") and every
# browser launch fails with "cannot open display". Await it. Idempotent: the
# regexp no longer matches once patched. Runs at build time (baked into the image).
- name: Patch camofox virtual-display await bug
  ansible.builtin.replace:
    path: "{{ camofox_dir }}/server.js"
    regexp: 'vdDisplay = localVirtualDisplay\.get\(\);'
    replace: 'vdDisplay = await localVirtualDisplay.get();'
  register: camofox_patch_server_js

# server.js calls playwright-core's firefox.newContext directly (bypassing
# camoufox-js's compat layer). playwright-core >=~1.59 sends a viewport with
# `isMobile`, which Camoufox's Juggler rejects ("isMobile not described in this
# scheme"), breaking every tab. Pin to the package.json floor (camoufox-js
# compatible) which predates that behavior. Baked into the image at build time.
- name: Pin playwright-core to a Camoufox-compatible version
  ansible.builtin.replace:
    path: "{{ camofox_dir }}/package.json"
    regexp: '"playwright-core":\s*"\^?1\.[0-9]+\.[0-9]+"'
    replace: '"playwright-core": "1.58.0"'
  register: camofox_patch_playwright

# Upstream vnc-watcher.sh has several issues:
#   1. Detects Xvfb display by grepping process args, but Camoufox uses
#      -displayfd (dynamic display allocation), so the display number is never in
#      ps args and x11vnc never starts.
#   2. If x11vnc dies but the display number is unchanged, the watcher never
#      re-attaches.
#   3. With `set -e`, a single x11vnc start failure (e.g. Xvfb not yet ready)
#      kills the watcher entirely, leaving noVNC without a VNC backend.
# Replace the whole file with a corrected version. Baked into image at build time.
- name: Install patched vnc-watcher.sh
  ansible.builtin.template:
    src: vnc-watcher.sh.j2
    dest: "{{ camofox_dir }}/plugins/vnc/vnc-watcher.sh"
    mode: "0755"
  register: camofox_patch_vnc_watcher

- name: Stop and remove camofox container when source patches change
  community.docker.docker_container:
    name: camofox-browser
    state: absent
  when: camofox_patch_server_js is changed or camofox_patch_playwright is changed or camofox_patch_vnc_watcher is changed

- name: Remove stale camofox image when source patches change
  community.docker.docker_image:
    name: "{{ camofox_image }}"
    state: absent
    force_absent: true
  when: camofox_patch_server_js is changed or camofox_patch_playwright is changed

- name: Check whether the camofox image already exists
  community.docker.docker_image_info:
    name: "{{ camofox_image }}"
  register: camofox_img

# `make build` runs `make fetch` (downloads the ~300MB Camoufox browser + yt-dlp
# into dist/) then a --no-cache docker build. Only run it when the target image
# is missing; bumping camofox_version changes the tag and re-triggers a build.
- name: Build camofox image on target
  ansible.builtin.command:
    cmd: "make build ARCH={{ camofox_arch }} VERSION={{ camofox_version }} RELEASE={{ camofox_release }}"
    chdir: "{{ camofox_dir }}"
  when: camofox_img.images | length == 0
  changed_when: true

- name: Run camofox-browser container
  community.docker.docker_container:
    name: camofox-browser
    image: "{{ camofox_image }}"
    restart_policy: unless-stopped
    published_ports: >-
      {{ ['%d:9377' % camofox_port]
         + (['%d:6080' % camofox_novnc_port] if camofox_vnc_enabled else [])
         + (['%d:5900' % camofox_vnc_port] if camofox_vnc_enabled else []) }}
    env: >-
      {{ ({'ENABLE_VNC': '1', 'VNC_BIND': '0.0.0.0', 'VNC_RESOLUTION': camofox_vnc_resolution}
          | combine({'VNC_PASSWORD': camofox_vnc_password} if (camofox_vnc_password | length > 0) else {}))
         if camofox_vnc_enabled else {} }}
    volumes: >-
      {{ [camofox_dir ~ '/plugins/vnc/vnc-watcher.sh:/app/plugins/vnc/vnc-watcher.sh:ro']
         if camofox_vnc_enabled else [] }}
    state: started

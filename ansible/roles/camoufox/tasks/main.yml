---
- name: Ensure Camoufox compose directory exists
  ansible.builtin.file:
    path: "{{ camoufox_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Camoufox build context to target
  ansible.builtin.copy:
    src: build/
    dest: "{{ camoufox_compose_dir }}/build/"
    owner: root
    group: root
    mode: "0644"
  register: camoufox_context

- name: Build Camoufox image on target
  community.docker.docker_image:
    name: "{{ camoufox_image }}"
    source: build
    build:
      path: "{{ camoufox_compose_dir }}/build"
      pull: true
    force_source: "{{ camoufox_context.changed }}"
    state: present

- name: Deploy Camoufox docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ camoufox_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart camoufox

- name: Deploy Camoufox using docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ camoufox_compose_dir }}"
    state: present

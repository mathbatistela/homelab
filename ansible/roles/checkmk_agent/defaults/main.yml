checkmk_settings:

  server:
    protocol: http
    validate_certs: true
    port: "{{ checkmk.server.port }}"
    address: "{{ checkmk.server.ip }}"
    user_automation:    "{{ checkmk.server.user_automation }}"
    user_automation_secret:  "{{ checkmk.server.user_automation_secret }}"
    bakery:
      signature_key_id: "{{ vault.infra.checkmk_automation_signature_key_id}}"
      signature_key_passphrase: "{{ vault.infra.checkmk_automation_signature_key_passphrase }}"

  agent:
    registration:
      server:   "{{ checkmk.server.dns }}"
      protocol: https
      delegate: true

    site:           "{{ checkmk.server.site }}"
    version:      "{{ checkmk.version }}"
    edition:      "{{ checkmk.edition }}"

# Derived variables for DRY task blocks
checkmk_server_url: "{{ checkmk_settings.server.protocol }}://{{ checkmk_settings.server.address }}:{{ checkmk_settings.server.port }}"
checkmk_automation_user: "{{ checkmk_settings.server.user_automation }}"
checkmk_automation_secret: "{{ checkmk_settings.server.user_automation_secret }}"
checkmk_site: "{{ checkmk_settings.agent.site }}"
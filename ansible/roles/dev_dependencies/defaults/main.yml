---
dev_dependencies_packages:
  - git
  - curl
  - ca-certificates
  - gnupg
  - make
  - python3
  - python3-venv
  - python3-pip
  - openssh-client
  - rsync
  - jq
  - yq
  - unzip

dev_dependencies_install_opentofu: true
dev_dependencies_opentofu_keyring_dir: /etc/apt/keyrings
dev_dependencies_opentofu_gpg_key: "{{ dev_dependencies_opentofu_keyring_dir }}/opentofu.gpg"
dev_dependencies_opentofu_repo_key: "{{ dev_dependencies_opentofu_keyring_dir }}/opentofu-repo.gpg"
dev_dependencies_opentofu_sources: /etc/apt/sources.list.d/opentofu.list

dev_dependencies_install_github_cli: true
dev_dependencies_github_cli_keyring: /usr/share/keyrings/githubcli-archive-keyring.gpg
dev_dependencies_github_cli_sources: /etc/apt/sources.list.d/github-cli.list

dev_dependencies_install_uv: true
dev_dependencies_uv_installer_url: https://astral.sh/uv/install.sh
dev_dependencies_uv_installer_path: /tmp/uv-install.sh
dev_dependencies_uv_install_dir: /usr/local/bin
dev_dependencies_uv_bin: "{{ dev_dependencies_uv_install_dir }}/uv"

# Docker is useful for app/image work, but many LXC hosts need nesting enabled
# before the daemon can run. Enable this per host once the container supports it.
dev_dependencies_install_docker: false
dev_dependencies_docker_packages:
  - docker.io
  - docker-compose-plugin

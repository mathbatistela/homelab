---
- name: Create Firecrawl compose directory
  ansible.builtin.file:
    path: "{{ firecrawl_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Firecrawl nuq-postgres data directory
  ansible.builtin.file:
    path: "{{ firecrawl_pgdata_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy Firecrawl docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ firecrawl_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  notify: Restart firecrawl

- name: Deploy Firecrawl using docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ firecrawl_compose_dir }}"
    state: present
    pull: always

---
hermes_compose_dir: /root/docker-compose-apps/hermes
hermes_home_dir: /root/docker-compose-apps/hermes/hermes-home
hermes_workspace_dir: /root/docker-compose-apps/hermes/workspace
hermes_uid: 1000
hermes_gid: 1000
hermes_webui_port: 8787
hermes_agent_image: nousresearch/hermes-agent:latest
# No built-in WebUI password: access is gated by Authelia (local) and Pangolin
# SSO (public) in front. The WebUI runs auth-disabled behind the trusted proxy.
hermes_webui_image: ghcr.io/nesquena/hermes-webui:latest

---
- name: Install base OS dependencies for Hermes
  ansible.builtin.apt:
    name:
      - git
      - curl
      - ca-certificates
      - python3
      - python3-venv
      - ripgrep
      - ffmpeg
    state: present
    update_cache: true

- name: Install Hermes agent via official installer (idempotent)
  ansible.builtin.shell:
    cmd: >-
      curl -fsSL {{ hermes_installer_url }} |
      bash -s -- --non-interactive --skip-setup --skip-browser
    creates: "{{ hermes_agent_bin }}"
  environment:
    HERMES_HOME: "{{ hermes_home }}"

- name: Install Playwright Chromium for the agent (best-effort, enables browse tools)
  ansible.builtin.command:
    cmd: "{{ hermes_agent_dir }}/venv/bin/python -m playwright install --with-deps chromium"
    creates: /root/.cache/ms-playwright
  environment:
    HERMES_HOME: "{{ hermes_home }}"
  register: hermes_playwright
  changed_when: hermes_playwright.rc == 0
  failed_when: false
  when: hermes_install_chromium | bool

- name: Clone/update hermes-webui
  ansible.builtin.git:
    repo: "{{ hermes_webui_repo }}"
    dest: "{{ hermes_webui_dir }}"
    version: "{{ hermes_webui_version }}"
    update: true
  notify: Restart hermes-webui

- name: Install hermes-webui systemd unit
  ansible.builtin.template:
    src: hermes-webui.service.j2
    dest: /etc/systemd/system/hermes-webui.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-webui

- name: Enable and start hermes-webui
  ansible.builtin.systemd:
    name: hermes-webui
    enabled: true
    state: started
    daemon_reload: true

- name: Ensure Hermes environment file exists with safe permissions
  ansible.builtin.file:
    path: "{{ hermes_home }}/.env"
    state: touch
    owner: root
    group: root
    mode: "0600"
  changed_when: false

- name: Back up Hermes environment file before modifying it
  ansible.builtin.shell:
    cmd: "cp -a {{ hermes_home }}/.env {{ hermes_home }}/.env.ansible-backup-$(date +%Y%m%d%H%M%S)"
  changed_when: false

- name: Remove stale system-level hermes-gateway unit if present
  ansible.builtin.file:
    path: /etc/systemd/system/hermes-gateway.service
    state: absent
  notify: Reload systemd

- name: Configure Hermes email gateway environment variables
  ansible.builtin.lineinfile:
    path: "{{ hermes_home }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
  loop:
    - { key: "EMAIL_ADDRESS", value: "{{ hermes_email_address }}" }
    - { key: "EMAIL_PASSWORD", value: "{{ hermes_email_password }}" }
    - { key: "EMAIL_IMAP_HOST", value: "{{ hermes_email_imap_host }}" }
    - { key: "EMAIL_SMTP_HOST", value: "{{ hermes_email_smtp_host }}" }
    - { key: "EMAIL_IMAP_PORT", value: "{{ hermes_email_imap_port }}" }
    - { key: "EMAIL_SMTP_PORT", value: "{{ hermes_email_smtp_port }}" }
    - { key: "EMAIL_POLL_INTERVAL", value: "{{ hermes_email_poll_interval }}" }
    - { key: "EMAIL_ALLOWED_USERS", value: "{{ hermes_email_allowed_users }}" }
    - { key: "EMAIL_HOME_ADDRESS", value: "{{ hermes_email_home_address }}" }
  notify: Restart hermes-gateway user service
  when: hermes_email_enabled | bool



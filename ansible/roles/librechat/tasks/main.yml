---
- name: Ensure LibreChat data directory exists
  ansible.builtin.file:
    path: "{{ librechat_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure LibreChat compose directory exists
  ansible.builtin.file:
    path: "{{ librechat_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy LibreChat docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ librechat_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Copy LibreChat config file
  ansible.builtin.template:
    src: librechat.yaml.j2
    dest: "{{ librechat_compose_dir }}/librechat.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy LibreChat using docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ librechat_compose_dir }}"
    state: present
    pull: policy

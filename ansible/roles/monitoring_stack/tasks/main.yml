---
- name: Create installation directory
  ansible.builtin.file:
    path: "{{ monitoring_stack_install_dir }}"
    state: directory
    mode: "0755"

- name: Sync stack files
  ansible.posix.synchronize:
    src: "files/docker_compose_files/"
    dest: "{{ monitoring_stack_dir }}/"
    delete: true
    private_key: "{{ ansible_ssh_private_key_file }}"
  delegate_to: localhost
  become: false

- name: Ensure stack directory permissions
  ansible.builtin.file:
    path: "{{ monitoring_stack_dir }}"
    state: directory
    mode: "0755"
    recurse: true

- name: Template Prometheus config from inventory
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_stack_dir }}/configs/prometheus/prometheus.yml"
    mode: "0644"
  register: monitoring_stack_prometheus_config
  notify: Reload Prometheus config

- name: Bring up stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ monitoring_stack_dir }}"
  changed_when: true

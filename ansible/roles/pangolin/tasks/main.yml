---
- name: Ensure config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pangolin_config_dir }}"
    - "{{ pangolin_config_dir }}/traefik"
    - "{{ pangolin_config_dir }}/traefik/logs"
    - "{{ pangolin_config_dir }}/crowdsec"
    - "{{ pangolin_config_dir }}/letsencrypt"
    - "{{ pangolin_config_dir }}/db"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pangolin_install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Deploy Pangolin config
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ pangolin_config_dir }}/config.yml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Deploy Traefik static config
  ansible.builtin.template:
    src: traefik_config.yml.j2
    dest: "{{ pangolin_config_dir }}/traefik/traefik_config.yml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Deploy Traefik dynamic config
  ansible.builtin.template:
    src: dynamic_config.yml.j2
    dest: "{{ pangolin_config_dir }}/traefik/dynamic_config.yml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Deploy CrowdSec acquisition config
  ansible.builtin.template:
    src: acquis.yaml.j2
    dest: "{{ pangolin_config_dir }}/crowdsec/acquis.yaml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Deploy CrowdSec profiles
  ansible.builtin.template:
    src: profiles.yaml.j2
    dest: "{{ pangolin_config_dir }}/crowdsec/profiles.yaml"
    mode: "0644"
  notify: Restart pangolin stack

- name: Bring up stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ pangolin_install_dir }}"
  changed_when: true

- name: Deploy Pangolin blueprint
  ansible.builtin.template:
    src: blueprint.yml.j2
    dest: "{{ pangolin_config_dir }}/blueprint.yml"
    mode: "0644"
  when: pangolin_blueprint | length > 0
  register: pangolin_blueprint_file

- name: Wait for Integration API to be ready
  ansible.builtin.uri:
    url: "{{ pangolin_api_url }}/v1/org/{{ pangolin_org_id }}/domains"
    method: GET
    headers:
      Authorization: "Bearer {{ pangolin_api_key }}"
    status_code: 200
  delegate_to: localhost
  become: false
  retries: 6
  delay: 10
  until: _api_check is not failed
  register: _api_check
  when: pangolin_blueprint_file is changed

- name: Apply Pangolin blueprint via API
  ansible.builtin.uri:
    url: "{{ pangolin_api_url }}/v1/org/{{ pangolin_org_id }}/blueprint"
    method: PUT
    headers:
      Authorization: "Bearer {{ pangolin_api_key }}"
    body_format: json
    body:
      blueprint: "{{ pangolin_blueprint | to_json | b64encode }}"
    status_code:
      - 200
      - 201
  delegate_to: localhost
  become: false
  when: pangolin_blueprint_file is changed

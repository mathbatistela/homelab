services:
  frontend:
    build:
      context: services/frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: services/api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

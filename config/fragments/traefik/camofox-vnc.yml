traefik_fragment_services:
  - filename: camofox-vnc.yml
    content: |
      http:
        routers:
          camofox-vnc:
            rule: "Host(`camofox.{{ traefik_local_domain }}`) && (PathPrefix(`/vnc`) || PathPrefix(`/app`) || PathPrefix(`/core`) || PathPrefix(`/vendor`) || PathPrefix(`/include`) || PathPrefix(`/utils`) || PathPrefix(`/websockify`))"
            entryPoints:
              - https
            service: camofox-vnc-service
            tls:
              certResolver: {{ traefik_cert_resolver_name }}
            priority: 100
        services:
          camofox-vnc-service:
            loadBalancer:
              servers:
                - url: "http://{{ hostvars['ai-tools'].ansible_host }}:6080"

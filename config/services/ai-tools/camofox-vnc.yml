service_manifest:
  name: camofox-vnc
  display_name: Camofox noVNC
  host: ai-tools
  service:
    # noVNC web UI for the Camofox browser desktop (port 6080 on ai-tools).
    port: 6080
    protocol: http
  exposure:
    local:
      enabled: true
      mode: fragment
      # Serves noVNC under camofox.local.batistela.tech/vnc.html
      # while the API stays on the root path of the same host.
      fragment: camofox-vnc
    public:
      enabled: true
      mode: generated
      subdomain: camofox
      protocol: http
  auth:
    sso: true
  deployment:
    owner: role
    role: camofox

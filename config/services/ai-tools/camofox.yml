service_manifest:
  name: camofox
  display_name: Camofox (stealth browser)
  host: ai-tools
  service:
    # jo-inc/camofox-browser HTTP control API (Camoufox stealth Firefox).
    # Consumed by the Hermes agent via CAMOFOX_URL=http://ai-tools:9377.
    port: 9377
    protocol: http
  exposure:
    local:
      enabled: true
      mode: fragment
      fragment: camofox
    public:
      enabled: true
      mode: generated
      subdomain: camofox
      protocol: http
  auth:
    sso: true
  deployment:
    owner: role
    role: camofox

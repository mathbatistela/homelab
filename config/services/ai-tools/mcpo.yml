service_manifest:
  name: mcpo
  display_name: MCPO Proxy
  host: ai-tools
  service:
    port: 8010
    protocol: http
  exposure:
    local:
      enabled: true
      mode: generated
      template: simple-http
      subdomain: mcpo
    public:
      enabled: false
      mode: generated
  auth:
    sso: false
  deployment:
    owner: role
    role: mcp_servers

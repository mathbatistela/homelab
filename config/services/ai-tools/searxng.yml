service_manifest:
  name: searxng
  display_name: SearXNG
  host: ai-tools
  service:
    port: 8080
    protocol: http
  exposure:
    local:
      enabled: true
      mode: generated
      template: simple-http
      subdomain: searxng
    public:
      enabled: false
  auth:
    sso: false
  deployment:
    owner: role
    role: searxng

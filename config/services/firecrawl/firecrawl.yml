service_manifest:
  name: firecrawl
  display_name: Firecrawl
  host: firecrawl
  service:
    port: 3002
    protocol: http
  exposure:
    local:
      enabled: true
      mode: generated
      template: simple-http
      subdomain: firecrawl
    public:
      enabled: false
  auth:
    sso: false
  deployment:
    owner: role
    role: firecrawl

service_manifest:
  name: alertmanager
  display_name: Alertmanager
  host: infra
  service:
    port: 9093
    protocol: http
  exposure:
    local:
      enabled: true
      mode: generated
      template: simple-http
      subdomain: alertmanager
    public:
      enabled: false
      mode: generated
  auth:
    sso: false
  deployment:
    owner: role
    role: monitoring_stack

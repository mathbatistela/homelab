service_manifest:
  name: librechat
  display_name: LibreChat
  host: tools
  service:
    port: 3080
    protocol: http
  exposure:
    local:
      enabled: true
      mode: generated
      template: simple-http
      subdomain: chat
    public:
      enabled: false
      mode: generated
  auth:
    sso: false
  deployment:
    owner: role
    role: librechat
